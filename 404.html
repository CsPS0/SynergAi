<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>404 - Synergy Not Found</title><script src="https://cdn.tailwindcss.com"></script><style>body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#0f172a;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}.glitch{position:relative;font-size:8rem;font-weight:900;line-height:1}.glitch::before,.glitch::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;background:#0f172a}.glitch::before{left:4px;text-shadow:-2px 0 red;animation:glitch-anim 2s infinite linear alternate-reverse}.glitch::after{left:-4px;text-shadow:-2px 0 blue;animation:glitch-anim-2 3s infinite linear alternate-reverse}@keyframes glitch-anim{0%{clip-path:inset(20% 0 80% 0)}20%{clip-path:inset(60% 0 10% 0)}40%{clip-path:inset(40% 0 50% 0)}60%{clip-path:inset(80% 0 5% 0)}80%{clip-path:inset(10% 0 70% 0)}100%{clip-path:inset(30% 0 20% 0)}}@keyframes glitch-anim-2{0%{clip-path:inset(10% 0 60% 0)}20%{clip-path:inset(30% 0 20% 0)}40%{clip-path:inset(70% 0 10% 0)}60%{clip-path:inset(20% 0 50% 0)}80%{clip-path:inset(50% 0 30% 0)}100%{clip-path:inset(5% 0 80% 0)}}.btn{padding:1rem 2rem;background:#3b82f6;border-radius:999px;text-decoration:none;color:#fff;font-weight:bold;margin-top:0.5rem;display:inline-block;transition:all 0.3s}.btn:hover{background:#1d4ed8;transform:scale(1.05)}</style></head><body><div class="text-center"><div class="glitch" data-text="404">404</div><h2 class="text-3xl mb-4 mt-4 font-bold" id="title-text">Neural Pathway Disconnected</h2><p class="text-slate-400 mb-8 max-w-md mx-auto" id="desc-text">Our proprietary LLM hallucinated this route. The synergistic paradigm you are looking for has been deprecated.</p>
<div id="btn-container" class="flex flex-col gap-2 max-w-xs mx-auto"></div>
<script>
const urlParams = new URLSearchParams(window.location.search);
const level = parseInt(urlParams.get('maze')) || 0;
const levels = [
{
title: "Neural Pathway Disconnected",
desc: "Our proprietary LLM hallucinated this route. The synergistic paradigm you are looking for has been deprecated.",
btns: ["Back to Synergy", "Fix the Blockchain", "Ask the AI"]
},
{
title: "404 - Dimensional Shift",
desc: "You took a wrong turn at the data lake. The hashes are not aligning.",
btns: ["Align Hashes", "Deploy Smart Contract", "Reboot Node"]
},
{
title: "ERROR: Out of Gas",
desc: "Your wallet does not have enough ETH to load the homepage.",
btns: ["Deposit ETH", "MINT NFT PASS", "Ignore"]
},
{
title: "Quantum Superposition",
desc: "The page both exists and does not exist. Observing it has collapsed its waveform.",
btns: ["Un-observe", "Measure Again", "Escape to Web2"]
}
];
const currentLevel = levels[level % levels.length];
document.getElementById('title-text').innerText = currentLevel.title;
document.getElementById('desc-text').innerText = currentLevel.desc;
const container = document.getElementById('btn-container');
currentLevel.btns.forEach(b => {
const a = document.createElement('a');
a.href = `404.html?maze=${level + 1}`;
a.className = "btn";
a.innerText = b;
container.appendChild(a);
});
// GAS FEES EVERYWHERE
window.addEventListener('click', (e) => {
const gas = document.createElement('div');
gas.innerText = '-10.000 Claude Token';
gas.style.position = 'fixed';
gas.style.color = 'red';
gas.style.fontWeight = 'bold';
gas.style.zIndex = '999999';
gas.style.pointerEvents = 'none';
gas.style.left = e.clientX + 'px';
gas.style.top = e.clientY + 'px';
gas.style.transition = 'all 2s ease-out';
document.body.appendChild(gas);
setTimeout(() => {
gas.style.transform = 'translateY(-100px)';
gas.style.opacity = '0';
}, 50);
setTimeout(() => gas.remove(), 2000);
});
</script>
</div></body></html>
